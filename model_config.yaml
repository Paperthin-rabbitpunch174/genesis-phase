# ─────────────────────────────────────────────────────────────────────────────
# PHASE — model_config.yaml
# Single source of truth for every model choice in the system.
# Edit this file to change models. No code changes needed.
#
# All models accessed via OpenRouter (OPENROUTER_API_KEY).
# Full model list: https://openrouter.ai/models
# ─────────────────────────────────────────────────────────────────────────────

# ── PLASMA (boss orchestrator) ────────────────────────────────────────────────
plasma:
  # Used for strategic decisions: goal decomposition, task assignment, evolution proposals
  strategic:    "anthropic/claude-opus-4-6"
  # Used for coordination: monitoring nodes, routing results, brief decisions
  coordination: "anthropic/claude-sonnet-4-6"
  # Used for internal summarisation: compacting memory, writing diary entries
  light:        "google/gemini-flash-1.5"

# ── SOLID (validators) ────────────────────────────────────────────────────────
# Three different models for genuine diversity of opinion.
# Majority vote (2/3) required to approve any result.
solid:
  validator_1: "google/gemini-flash-1.5"          # speed + breadth
  validator_2: "anthropic/claude-haiku-4-5-20251001" # reasoning quality
  validator_3: "meta-llama/llama-3.1-8b-instruct"  # independent open-source

# ── FLUX nodes ────────────────────────────────────────────────────────────────
flux:
  # Core always-on nodes
  coder:      "anthropic/claude-sonnet-4-6"    # MID — code generation + editing
  researcher: "google/gemini-flash-1.5"        # NANO — web search + summarise
  reviewer:   "google/gemini-flash-1.5"        # NANO — quality checking

  # On-demand nodes (spawned by PLASMA when needed, killed when idle)
  architect:  "anthropic/claude-opus-4-6"      # PRO — design decisions

  # Plugin nodes (activated when plugin is loaded)
  # skynet:   "anthropic/claude-sonnet-4-6"   # uncomment when skynet plugin added
  # custom:   "google/gemini-flash-1.5"        # template for your own node

# ── FALLBACK chain ────────────────────────────────────────────────────────────
# If primary model returns empty response, try these in order.
fallback:
  - "anthropic/claude-sonnet-4-6"
  - "google/gemini-2.5-pro-preview"
  - "openai/gpt-4.1"

# ── BUDGET ────────────────────────────────────────────────────────────────────
budget:
  # Soft cost cap per task per node (dollars). PLASMA can override for priority tasks.
  per_task_caps:
    coder:      0.50
    researcher: 0.10
    reviewer:   0.08
    architect:  1.00
    default:    0.25

  # SOLID always funded from this protected reserve (% of total budget)
  solid_reserve_pct: 5

  # PLASMA background consciousness (% of total budget)
  plasma_bg_pct: 10

# ── MAX ROUNDS ────────────────────────────────────────────────────────────────
# Maximum LLM rounds per task before giving up.
max_rounds:
  plasma_strategic:    200
  plasma_coordination: 60
  coder:               80
  researcher:          20
  reviewer:            15
  architect:           200
  solid_vote:          5

# ── TIMEOUTS ─────────────────────────────────────────────────────────────────
timeouts:
  node_task_seconds:   300   # 5 min max per FLUX task
  solid_vote_seconds:  30    # 30s max per SOLID vote
  plasma_evolve_seconds: 600 # 10 min max for evolution cycle
